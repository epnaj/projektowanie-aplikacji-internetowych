{{define "head"}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixel Tracker</title>
<script src="/static/htmx.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 48rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
  header { display: flex; align-items: center; justify-content: space-between; }
  form { display: flex; gap: .5rem; flex-wrap: wrap; margin: 1rem 0; }
  input { padding: .4rem .6rem; }
  button { padding: .4rem .8rem; cursor: pointer; }
  ul { list-style: none; padding: 0; }
  li { display: flex; align-items: center; gap: .75rem; padding: .5rem 0; border-bottom: 1px solid #8884; }
  code { background: #8882; padding: .15rem .35rem; border-radius: 3px; font-size: .85em; word-break: break-all; }
  .error { color: #c0392b; min-height: 1.2em; }
  .muted { opacity: .6; }
  table { border-collapse: collapse; width: 100%; margin-top: .5rem; }
  th, td { text-align: left; padding: .3rem .5rem; border-bottom: 1px solid #8884; }
  .del { margin-left: auto; }
</style>
{{end}}
